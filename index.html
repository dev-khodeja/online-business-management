<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order & Payment Demo (No Backend)</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f3f4f6;
    margin: 0;
    padding: 0;
    color: #222;
  }
  header {
    background: #185FA5;
    color: white;
    padding: 18px 24px;
    font-size: 22px;
    font-weight: bold;
  }
  header small {
    display: block;
    font-size: 12px;
    font-weight: normal;
    opacity: 0.85;
    margin-top: 4px;
  }
  .container {
    max-width: 1000px;
    margin: 24px auto;
    padding: 0 16px;
  }
  #productGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
  }
  .card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
  }
  .card img { width: 100%; height: 140px; object-fit: cover; }
  .card-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; }
  .card-body h3 { margin: 0 0 6px; font-size: 15px; }
  .card-body .cat { color: #777; font-size: 12px; margin-bottom: 8px; }
  .card-body .price { font-weight: bold; color: #0F6E56; font-size: 16px; margin-bottom: 10px; }
  .card-body .stock { font-size: 12px; color: #993C1D; margin-bottom: 10px; }
  button {
    background: #185FA5;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    margin-top: auto;
  }
  button:hover { background: #0d4a85; }
  button:disabled { background: #aaa; cursor: not-allowed; }

  /* Modal */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    align-items: center; justify-content: center;
    z-index: 50;
  }
  .overlay.active { display: flex; }
  .modal {
    background: white;
    border-radius: 10px;
    padding: 24px;
    width: 90%;
    max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { margin-top: 0; font-size: 18px; color: #185FA5; }
  .modal label { display: block; font-size: 13px; margin: 10px 0 4px; color: #444; }
  .modal input, .modal select {
    width: 100%; padding: 9px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px;
  }
  .modal .actions { display: flex; gap: 10px; margin-top: 18px; }
  .modal .actions button.cancel { background: #999; }
  .msg { font-size: 13px; margin-top: 8px; }
  .msg.error { color: #b3261e; }
  .msg.success { color: #0F6E56; }

  .confirm-box { text-align: center; }
  .confirm-box .tick { font-size: 40px; }
  .confirm-box.fail .tick { color: #b3261e; }
  .confirm-box.success .tick { color: #0F6E56; }

  .spinner {
    border: 4px solid #eee;
    border-top: 4px solid #185FA5;
    border-radius: 50%;
    width: 36px; height: 36px;
    margin: 10px auto;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .note {
    background: #fff8e1;
    border: 1px solid #e8d48a;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12.5px;
    margin-bottom: 18px;
    color: #6b5900;
  }

  .orders-log {
    margin-top: 30px;
  }
  .orders-log h2 { font-size: 17px; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
  th, td { padding: 8px 10px; font-size: 13px; text-align: left; border-bottom: 1px solid #eee; }
  th { background: #185FA5; color: white; }
  tr:last-child td { border-bottom: none; }
  .status-placed { color: #0F6E56; font-weight: bold; }
  .status-failed { color: #b3261e; font-weight: bold; }
</style>
</head>
<body>

<header>
  🛒 Online Business Management System — Order &amp; Payment
  
</header>

<div class="container">



  <h2>Products</h2>
  <div id="productGrid"></div>

  <div class="orders-log">
    <h2>Order History</h2>
    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Product</th>
          <th>Qty</th>
          <th>Total</th>
          <th>Payment</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="ordersBody"></tbody>
    </table>
  </div>

</div>

<!-- Order Modal -->
<div class="overlay" id="orderOverlay">
  <div class="modal" id="orderModalContent"></div>
</div>

<script>
/* ---------------- In-memory "database" ---------------- */
const API_BASE = 'https://online-business-management.onrender.com';

let products = [
  { productId: 1, name: 'Split AC 1.5 Ton',        category: 'Home Appliances',    price: 45000, photo: 'https://images.unsplash.com/photo-1718203862467-c33159fdc504?w=400&h=300&fit=crop&auto=format&q=80', stock: 10 },
  { productId: 2, name: 'Office Chair (Ergonomic)', category: 'Office Equipment',   price: 8500,  photo: 'https://images.unsplash.com/photo-1688578735352-9a6f2ac3b70a?w=400&h=300&fit=crop&auto=format&q=80', stock: 15 },
  { productId: 3, name: "Men's Formal Shirt",       category: 'Men Clothing',       price: 1200,  photo: 'https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=400&h=300&fit=crop&auto=format&q=80', stock: 30 },
  { productId: 4, name: 'Smartphone X200',          category: 'Electronic Gadgets', price: 32000, photo: 'https://images.unsplash.com/photo-1578242174372-e26b3681587f?w=400&h=300&fit=crop&auto=format&q=80', stock: 8 },
];

let orders = [];
let nextOrderId = 1001;
let selectedProduct = null;

/* ---------------- Render products ---------------- */
function renderProducts() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = '';
  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${p.photo}" alt="${p.name}">
      <div class="card-body">
        <h3>${p.name}</h3>
        <div class="cat">${p.category}</div>
        <div class="price">৳ ${p.price.toLocaleString()}</div>
        <div class="stock">Stock: ${p.stock}</div>
        <button onclick="openOrderForm(${p.productId})" ${p.stock === 0 ? 'disabled' : ''}>
          ${p.stock === 0 ? 'Out of Stock' : 'Order / Book Now'}
        </button>
      </div>`;
    grid.appendChild(card);
  });
}

/* ---------------- Render order history table ---------------- */
function renderOrders() {
  const body = document.getElementById('ordersBody');
  if (orders.length === 0) {
    body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">এখনো কোনো অর্ডার হয়নি</td></tr>';
    return;
  }
  body.innerHTML = orders.slice().reverse().map(o => `
    <tr>
      <td>#${o.orderId}</td>
      <td>${o.productName}</td>
      <td>${o.quantity}</td>
      <td>৳ ${o.totalAmount.toLocaleString()}</td>
      <td>${o.paymentMethod}</td>
      <td class="${o.status === 'Order Placed' ? 'status-placed' : 'status-failed'}">${o.status}</td>
    </tr>
  `).join('');
}

/* ---------------- Open order form modal ---------------- */
function openOrderForm(productId) {
  const product = products.find(p => p.productId === productId);
  if (!product) return;
  selectedProduct = product;

  const content = document.getElementById('orderModalContent');
  content.innerHTML = `
    <h2>Book: ${product.name}</h2>
    <label>Quantity</label>
    <input type="number" id="qty" value="1" min="1" max="${product.stock}">

    <label>আপনার নাম</label>
    <input type="text" id="cname" placeholder="Full Name">

    <label>মোবাইল নাম্বার</label>
    <input type="text" id="cphone" placeholder="01XXXXXXXXX">

    <label>ঠিকানা</label>
    <input type="text" id="caddress" placeholder="Shipping Address">

    <label>Payment Method</label>
    <select id="paymethod">
      <option value="Cash on Delivery">Cash on Delivery</option>
      <option value="bKash">bKash</option>
      <option value="Card">Debit/Credit Card</option>
    </select>

    <div class="msg" id="formMsg"></div>

    <div class="actions">
      <button id="confirmBtn" onclick="submitOrder()">Confirm Order</button>
      <button class="cancel" onclick="closeModal()">Cancel</button>
    </div>
  `;
  document.getElementById('orderOverlay').classList.add('active');
}

/* ---------------- Validate + simulate payment + place order ---------------- */
function submitOrder() {
  const qty = parseInt(document.getElementById('qty').value, 10);
  const cname = document.getElementById('cname').value.trim();
  const cphone = document.getElementById('cphone').value.trim();
  const caddress = document.getElementById('caddress').value.trim();
  const paymethod = document.getElementById('paymethod').value;
  const msg = document.getElementById('formMsg');

  if (!cname || !cphone || !caddress || !qty || qty < 1) {
    msg.textContent = 'সব ঘর সঠিকভাবে পূরণ করুন।';
    msg.className = 'msg error';
    return;
  }
  if (qty > selectedProduct.stock) {
    msg.textContent = 'পর্যাপ্ত Stock নেই।';
    msg.className = 'msg error';
    return;
  }

  // পেমেন্ট প্রসেসিং
  if (paymethod === 'Cash on Delivery') {
    finalizeOrder(qty, cname, cphone, caddress, paymethod, true);
  } else {
    showProcessingPayment();
    setTimeout(() => {
      const success = Math.random() < 0.85; // ৮৫% সময় সফল দেখাবে (demo purpose)
      finalizeOrder(qty, cname, cphone, caddress, paymethod, success);
    }, 2000);
  }
}

function showProcessingPayment() {
  const content = document.getElementById('orderModalContent');
  content.innerHTML = `
    <div class="confirm-box">
      <h2>Payment Gateway-তে যোগাযোগ হচ্ছে...</h2>
      <div class="spinner"></div>
      <p style="color:#777;font-size:13px;">অনুগ্রহ করে অপেক্ষা করুন (demo — actual gateway না)</p>
    </div>
  `;
}

/* ---------------- Finalize order (success or fail) ---------------- */
function finalizeOrder(qty, cname, cphone, caddress, paymethod, paymentSuccess) {
  const content = document.getElementById('orderModalContent');

  if (!paymentSuccess) {

    const failedOrder = {
      orderId: nextOrderId++,
      productName: selectedProduct.name,
      quantity: qty,
      totalAmount: selectedProduct.price * qty,
      paymentMethod: paymethod,
      status: 'Payment Failed',
    };
    orders.push(failedOrder);
    renderOrders();

    content.innerHTML = `
      <div class="confirm-box fail">
        <div class="tick">❌</div>
        <h2>Payment ব্যর্থ হয়েছে</h2>
        <p>দুঃখিত, আপনার পেমেন্ট প্রসেস করা যায়নি। আবার চেষ্টা করুন।</p>
        <div class="actions">
          <button onclick="openOrderForm(${selectedProduct.productId})">আবার চেষ্টা করুন</button>
          <button class="cancel" onclick="closeModal()">বন্ধ করুন</button>
        </div>
      </div>
    `;
    return;
  }


  selectedProduct.stock -= qty;
  const order = {
    orderId: nextOrderId++,
    productId: selectedProduct.productId,
    productName: selectedProduct.name,
    quantity: qty,
    totalAmount: selectedProduct.price * qty,
    customerName: cname,
    phone: cphone,
    address: caddress,
    paymentMethod: paymethod,
    status: 'Order Placed',
    orderDate: new Date().toISOString(),
  };
  orders.push(order);
  renderProducts();
  renderOrders();

  content.innerHTML = `
    <div class="confirm-box success">
      <div class="tick">✅</div>
      <h2>অর্ডার সফল হয়েছে!</h2>
      <p><b>Order ID:</b> #${order.orderId}</p>
      <p><b>Product:</b> ${order.productName} × ${order.quantity}</p>
      <p><b>Total:</b> ৳ ${order.totalAmount.toLocaleString()}</p>
      <p><b>Payment:</b> ${order.paymentMethod}</p>
      <p><b>Status:</b> ${order.status}</p>
      <div class="actions">
        <button onclick="closeModal()">Done</button>
      </div>
    </div>
  `;
}

function closeModal() {
  document.getElementById('orderOverlay').classList.remove('active');
}

/* ---------------- init ---------------- */
renderProducts();
renderOrders();
</script>
</body>
</html>
