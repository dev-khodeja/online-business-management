<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Booking Demo</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f3f4f6;
    margin: 0;
    padding: 0;
    color: #222;
  }
  header {
    background: #185FA5;
    color: white;
    padding: 18px 24px;
    font-size: 22px;
    font-weight: bold;
  }
  .container {
    max-width: 1000px;
    margin: 24px auto;
    padding: 0 16px;
  }
  #productGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
  }
  .card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
  }
  .card img { width: 100%; height: 140px; object-fit: cover; }
  .card-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; }
  .card-body h3 { margin: 0 0 6px; font-size: 15px; }
  .card-body .cat { color: #777; font-size: 12px; margin-bottom: 8px; }
  .card-body .price { font-weight: bold; color: #0F6E56; font-size: 16px; margin-bottom: 10px; }
  .card-body .stock { font-size: 12px; color: #993C1D; margin-bottom: 10px; }
  button {
    background: #185FA5;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    margin-top: auto;
  }
  button:hover { background: #0d4a85; }

  /* Modal */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    align-items: center; justify-content: center;
    z-index: 50;
  }
  .overlay.active { display: flex; }
  .modal {
    background: white;
    border-radius: 10px;
    padding: 24px;
    width: 90%;
    max-width: 420px;
  }
  .modal h2 { margin-top: 0; font-size: 18px; color: #185FA5; }
  .modal label { display: block; font-size: 13px; margin: 10px 0 4px; color: #444; }
  .modal input, .modal select {
    width: 100%; padding: 9px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px;
  }
  .modal .actions { display: flex; gap: 10px; margin-top: 18px; }
  .modal .actions button.cancel { background: #999; }
  .msg { font-size: 13px; margin-top: 8px; }
  .msg.error { color: #b3261e; }
  .msg.success { color: #0F6E56; }

  .confirm-box {
    text-align: center;
  }
  .confirm-box .tick {
    font-size: 40px; color: #0F6E56;
  }
</style>
</head>
<body>

<header>🛒 Online Business Management System — Order Booking </header>

<div class="container">
  <h2>Products</h2>
  <div id="productGrid">Loading products...</div>
</div>

<!-- Order Modal -->
<div class="overlay" id="orderOverlay">
  <div class="modal" id="orderModalContent">
    <!-- filled by JS -->
  </div>
</div>

<script>
const API_BASE = 'http://localhost:5000/api';
let selectedProduct = null;
let allProducts = []; // 

async function loadProducts() {
  const grid = document.getElementById('productGrid');
  try {
    const res = await fetch(`${API_BASE}/products`);
    const products = await res.json();
    allProducts = products; 
    grid.innerHTML = '';
    products.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${p.photo}" alt="${p.name}">
        <div class="card-body">
          <h3>${p.name}</h3>
          <div class="cat">${p.category}</div>
          <div class="price">৳ ${p.price.toLocaleString()}</div>
          <div class="stock">Stock: ${p.stock}</div>
          <button onclick="openOrderForm(${p.productId})">Order / Book Now</button>
        </div>`;
      grid.appendChild(card);
    });
  } catch (err) {
    grid.innerHTML = '<p style="color:red">⚠️ Backend server-এ connect করা যাচ্ছে না। server.js চালু আছে কিনা check করুন ।</p>';
  }
}

function openOrderForm(productId) {
  const product = allProducts.find(p => p.productId === productId);
  if (!product) return;
  selectedProduct = product;
  const content = document.getElementById('orderModalContent');
  content.innerHTML = `
    <h2>Book: ${product.name}</h2>
    <label>Quantity</label>
    <input type="number" id="qty" value="1" min="1" max="${product.stock}">

    <label>আপনার নাম</label>
    <input type="text" id="cname" placeholder="Full Name">

    <label>মোবাইল নাম্বার</label>
    <input type="text" id="cphone" placeholder="01XXXXXXXXX">

    <label>ঠিকানা</label>
    <input type="text" id="caddress" placeholder="Shipping Address">

    <label>Payment Method</label>
    <select id="paymethod">
      <option value="Cash on Delivery">Cash on Delivery</option>
      <option value="bKash">bKash</option>
      <option value="Card">Debit/Credit Card</option>
    </select>

    <div class="msg" id="formMsg"></div>

    <div class="actions">
      <button onclick="submitOrder()">Confirm Order</button>
      <button class="cancel" onclick="closeModal()">Cancel</button>
    </div>
  `;
  document.getElementById('orderOverlay').classList.add('active');
}

async function submitOrder() {
  const qty = document.getElementById('qty').value;
  const cname = document.getElementById('cname').value.trim();
  const cphone = document.getElementById('cphone').value.trim();
  const caddress = document.getElementById('caddress').value.trim();
  const paymethod = document.getElementById('paymethod').value;
  const msg = document.getElementById('formMsg');

  if (!cname || !cphone || !caddress) {
    msg.textContent = 'সব ঘর পূরণ করুন।';
    msg.className = 'msg error';
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        productId: selectedProduct.productId,
        quantity: qty,
        customerName: cname,
        phone: cphone,
        address: caddress,
        paymentMethod: paymethod
      })
    });
    const data = await res.json();

    if (!data.success) {
      msg.textContent = data.message;
      msg.className = 'msg error';
      return;
    }

    showConfirmation(data.order);
    loadProducts(); // refresh stock
  } catch (err) {
    msg.textContent = 'Server error, আবার চেষ্টা করুন।';
    msg.className = 'msg error';
  }
}

function showConfirmation(order) {
  const content = document.getElementById('orderModalContent');
  content.innerHTML = `
    <div class="confirm-box">
      <div class="tick">✅</div>
      <h2>অর্ডার সফল হয়েছে!</h2>
      <p><b>Order ID:</b> #${order.orderId}</p>
      <p><b>Product:</b> ${order.productName} × ${order.quantity}</p>
      <p><b>Total:</b> ৳ ${order.totalAmount.toLocaleString()}</p>
      <p><b>Status:</b> ${order.status}</p>
      <div class="actions">
        <button onclick="closeModal()">Done</button>
      </div>
    </div>
  `;
}

function closeModal() {
  document.getElementById('orderOverlay').classList.remove('active');
}

loadProducts();
</script>
</body>
</html>
